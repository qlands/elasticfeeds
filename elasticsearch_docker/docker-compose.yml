# Single-node ElasticSearch 9.2.1 for local development and running the test suite.
#
# Security is enabled (the 8.x/9.x default) but TLS on the HTTP layer is turned
# off so the library can talk to it over plain http with basic auth, matching
# the pytest setup (ES_USER / ES_PASS).
#
# Usage:
#   export ES_PASS="my_es_password"
#   docker compose up -d
#   # user name is "elastic"
services:
  es01:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.1
    container_name: ef-es01
    environment:
      - node.name=es01
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - ELASTIC_PASSWORD=${ES_PASS:-changeme}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.license.self_generated.type=basic
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - data01:/usr/share/elasticsearch/data
    ports:
      - 9200:9200
    networks:
      - elastic

volumes:
  data01:
    driver: local

networks:
  elastic:
    driver: bridge
